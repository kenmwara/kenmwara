<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="Ken Mwara — solo operator. Six products. One stack. Vancouver, BC.">
  <defs>
    <!-- Background gradient: deep navy with a subtle right-side green glow, matching brand cover sheets -->
    <radialGradient id="bgGlow" cx="78%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#1A3A5C" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#122237" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0E1828" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="22%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#1E7FA8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0E1828" stop-opacity="0"/>
    </radialGradient>

    <!-- Icon: rounded chip with cyan->green ascending line, the T BOT mark -->
    <linearGradient id="chipFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#163455"/>
      <stop offset="100%" stop-color="#0C1C2E"/>
    </linearGradient>
    <radialGradient id="chipGlow" cx="72%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#00B864" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#028349" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0C1C2E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineStroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="65%" stop-color="#5BCFFF"/>
      <stop offset="100%" stop-color="#00E87A"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cursorGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle blueprint grid -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#243F62" stroke-width="0.6" stroke-opacity="0.22"/>
    </pattern>
    <pattern id="gridFine" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#243F62" stroke-width="0.3" stroke-opacity="0.10"/>
    </pattern>
  </defs>

  <!-- ============================================================
       LAYER 1 — Background
       ============================================================ -->
  <rect width="1500" height="500" fill="#0E1828"/>
  <rect width="1500" height="500" fill="url(#gridFine)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>
  <rect width="1500" height="500" fill="url(#cyanGlow)"/>
  <rect width="1500" height="500" fill="url(#bgGlow)"/>

  <!-- ============================================================
       LAYER 2 — Corner brackets (operator-readout framing)
       ============================================================ -->
  <g stroke="#38BDF8" stroke-opacity="0.45" stroke-width="1.2" fill="none">
    <!-- top-left -->
    <path d="M 36 36 L 36 64 M 36 36 L 64 36"/>
    <!-- top-right -->
    <path d="M 1464 36 L 1464 64 M 1464 36 L 1436 36"/>
    <!-- bottom-left -->
    <path d="M 36 464 L 36 436 M 36 464 L 64 464"/>
    <!-- bottom-right -->
    <path d="M 1464 464 L 1464 436 M 1464 464 L 1436 464"/>
  </g>

  <!-- ============================================================
       LAYER 3 — Top operator strip (ID stack)
       ============================================================ -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="2.2">
    <text x="80" y="60" font-weight="500">
      <tspan fill="#5BCFFF">OPERATOR</tspan>
      <tspan fill="#F7F4ED" dx="14">KEN · MWARA</tspan>
    </text>

    <text x="1420" y="60" fill="#5BCFFF" font-weight="500" text-anchor="end">VANCOUVER · BC</text>
  </g>
  <line x1="80" y1="74" x2="1420" y2="74" stroke="#243F62" stroke-opacity="0.6" stroke-dasharray="2 4"/>

  <!-- ============================================================
       LAYER 4 — Icon (T BOT mark, scaled and used as Ken's brand chip)
       ============================================================ -->
  <g transform="translate(80, 138)">
    <!-- chip body, rounded square 200x200 -->
    <rect x="0" y="0" width="200" height="200" rx="42" ry="42" fill="url(#chipFace)" stroke="#243F62" stroke-width="1.2"/>
    <rect x="0" y="0" width="200" height="200" rx="42" ry="42" fill="url(#chipGlow)"/>

    <!-- inner inset highlight -->
    <rect x="1.5" y="1.5" width="197" height="197" rx="40.5" ry="40.5" fill="none" stroke="#5BCFFF" stroke-opacity="0.10" stroke-width="0.8"/>

    <!-- ascending line chart -->
    <g filter="url(#softGlow)">
      <polyline points="32,158 70,128 96,142 124,96 152,76 178,42"
                fill="none"
                stroke="url(#lineStroke)"
                stroke-width="6.5"
                stroke-linecap="round"
                stroke-linejoin="round"/>
    </g>
    <!-- data dots -->
    <circle cx="32"  cy="158" r="4.5" fill="#38BDF8"/>
    <circle cx="70"  cy="128" r="4.5" fill="#3FC8F2"/>
    <circle cx="96"  cy="142" r="4.5" fill="#48D2DA"/>
    <circle cx="124" cy="96"  r="4.5" fill="#52DCC1"/>
    <circle cx="152" cy="76"  r="4.5" fill="#5BE6A8"/>
    <circle cx="178" cy="42"  r="6"   fill="#00E87A"/>
    <circle cx="178" cy="42"  r="11"  fill="#00E87A" fill-opacity="0.22"/>
  </g>

  <!-- ============================================================
       LAYER 5 — Wordmark + cursor
       ============================================================ -->
  <!-- KEN MWARA — Inter Black, very tight tracking, off-white. -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
    <text x="320" y="248"
          font-size="124"
          font-weight="900"
          fill="#F7F4ED"
          letter-spacing="-6.5"
          textLength="810"
          lengthAdjust="spacingAndGlyphs"
          style="font-stretch:condensed">KEN MWARA</text>

    <!-- signature cyan cursor block, the kit's hallmark.
         positioned just after the wordmark with a small gap. -->
    <g filter="url(#cursorGlow)">
      <rect x="1148" y="166" width="60" height="88" fill="#38BDF8"/>
    </g>
  </g>

  <!-- ============================================================
       LAYER 6 — Tagline (Fraunces italic, brand voice)
       ============================================================ -->
  <g font-family="'Fraunces', 'Georgia', serif">
    <text x="322" y="304"
          font-size="28"
          font-style="italic"
          font-weight="400"
          fill="#EFEBE0"
          opacity="0.92">Solo operator. <tspan fill="#5BCFFF">Six products.</tspan> One stack.</text>
  </g>

  <!-- subtle scan-line / data-stream accent in the right negative space, balances the icon weight on the left -->
  <g opacity="0.55">
    <!-- a small cluster of horizontal hairlines suggesting a data stream -->
    <g stroke="#5BCFFF" stroke-width="0.6" stroke-linecap="round">
      <line x1="1230" y1="186" x2="1290" y2="186" stroke-opacity="0.55"/>
      <line x1="1300" y1="186" x2="1340" y2="186" stroke-opacity="0.35"/>
      <line x1="1230" y1="198" x2="1270" y2="198" stroke-opacity="0.30"/>
      <line x1="1230" y1="210" x2="1310" y2="210" stroke-opacity="0.45"/>
      <line x1="1320" y1="210" x2="1360" y2="210" stroke-opacity="0.25"/>
      <line x1="1230" y1="222" x2="1280" y2="222" stroke-opacity="0.20"/>
      <line x1="1230" y1="234" x2="1340" y2="234" stroke-opacity="0.35"/>
    </g>
    <!-- a small marker dot suggesting an active tick -->
    <circle cx="1380" cy="210" r="3" fill="#00E87A"/>
    <circle cx="1380" cy="210" r="7" fill="#00E87A" fill-opacity="0.25"/>
    <text x="1395" y="214"
          font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="9"
          letter-spacing="2"
          fill="#00E87A"
          fill-opacity="0.85"
          font-weight="700">LIVE</text>
  </g>

  <!-- ============================================================
       LAYER 7 — Bottom operator strip (the system-not-brand rail)
       ============================================================ -->
  <line x1="80" y1="378" x2="1420" y2="378" stroke="#243F62" stroke-opacity="0.6" stroke-dasharray="2 4"/>

  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" letter-spacing="1.8">
    <!-- column 1: surfaces -->
    <text x="80" y="412" fill="#5BCFFF" opacity="0.9" font-weight="500">SURFACES</text>
    <text x="80" y="434" fill="#F7F4ED" font-weight="500">TRADING · INFOPROD · CONTENT</text>

    <!-- column 2: stack -->
    <text x="500" y="412" fill="#5BCFFF" opacity="0.9" font-weight="500">STACK</text>
    <text x="500" y="434" fill="#F7F4ED" font-weight="500">PY · TS · CLOUDFLARE</text>

    <!-- column 3: posture -->
    <text x="850" y="412" fill="#5BCFFF" opacity="0.9" font-weight="500">POSTURE</text>
    <g>
      <circle cx="858" cy="429.5" r="4" fill="#00E87A"/>
      <circle cx="858" cy="429.5" r="8" fill="#00E87A" fill-opacity="0.25"/>
      <text x="876" y="434" fill="#00E87A" font-weight="700">SHIPPING</text>
    </g>

    <!-- column 4: count -->
    <text x="1420" y="412" fill="#5BCFFF" opacity="0.9" font-weight="500" text-anchor="end">PRODUCTS LIVE</text>
    <text x="1420" y="434" fill="#F7F4ED" font-weight="700" text-anchor="end" font-size="13">06 / 06</text>
  </g>

  <!-- subtle baseline label -->
  <text x="750" y="478"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="9"
        letter-spacing="3.5"
        fill="#F7F4ED"
        fill-opacity="0.35"
        text-anchor="middle"
        font-weight="500">SURFACE ISOLATION · APPEND-ONLY · CLOUDFLARE-NATIVE</text>
</svg>
